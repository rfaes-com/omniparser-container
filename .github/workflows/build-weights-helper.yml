name: build-weights-helper

on:
  push:
    tags: ["v*"]
    paths:
      - Dockerfile.weights
      - scripts/download_weights.sh
      - .github/workflows/build-weights-helper.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniparser-container

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build weights helper (amd64)
    runs-on: arc-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push weights helper (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.weights
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:weights-amd64-${{ github.sha }}

  build-arm64:
    name: Build weights helper (arm64)
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push weights helper (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.weights
          push: true
          platforms: linux/arm64
          tags: ${{ env.IMAGE }}:weights-arm64-${{ github.sha }}

  publish-manifest:
    name: Publish weights helper manifest
    runs-on: arc-amd64
    needs: [build-amd64, build-arm64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          extra_tags=()
          if [ "${REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "${{ env.IMAGE }}:weights-${REF_NAME}")
          fi

          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:weights" \
            -t "${{ env.IMAGE }}:weights-${{ github.sha }}" \
            "${extra_tags[@]}" \
            "${{ env.IMAGE }}:weights-amd64-${{ github.sha }}" \
            "${{ env.IMAGE }}:weights-arm64-${{ github.sha }}"

      - name: Verify manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:weights-${{ github.sha }}"
