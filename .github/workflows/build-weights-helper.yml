name: build-weights-helper

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Dockerfile.weights
      - scripts/download_weights.sh
      - .github/workflows/build-weights-helper.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniparser-container

jobs:
  build-weights-helper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push weights helper
        run: |
          extra_tags=()
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "$IMAGE:weights-${GITHUB_REF_NAME}")
          fi

          docker buildx build \
            -f Dockerfile.weights \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE:weights \
            -t $IMAGE:weights-${{ github.sha }} \
            "${extra_tags[@]}" \
            --push .
