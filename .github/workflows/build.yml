name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniparser-container

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [ "${REF_TYPE}" = "tag" ]; then
            version="${REF_NAME#v}"
          else
            version=""
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-cpu-amd64:
    name: Build CPU (amd64)
    runs-on: arc-amd64
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          {
            echo "${{ env.IMAGE }}:cpu-amd64-${{ github.sha }}"
            echo "${{ env.IMAGE }}:cpu-amd64"
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${{ env.IMAGE }}:cpu-amd64-${VERSION}"
            fi
          } > /tmp/tags.txt
          { echo "tags<<EOF"; cat /tmp/tags.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: FLAVOR=cpu
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-amd64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-amd64,mode=max

  build-cpu-arm64:
    name: Build CPU (arm64)
    runs-on: arc-arm64
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          {
            echo "${{ env.IMAGE }}:cpu-arm64-${{ github.sha }}"
            echo "${{ env.IMAGE }}:cpu-arm64"
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${{ env.IMAGE }}:cpu-arm64-${VERSION}"
            fi
          } > /tmp/tags.txt
          { echo "tags<<EOF"; cat /tmp/tags.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: FLAVOR=cpu
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-arm64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-arm64,mode=max

  build-cuda-amd64:
    name: Build CUDA (amd64)
    runs-on: arc-amd64
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          {
            echo "${{ env.IMAGE }}:cuda-cu121-amd64-${{ github.sha }}"
            echo "${{ env.IMAGE }}:cuda-cu121-amd64"
            if [ "${REF_TYPE}" = "tag" ]; then
              echo "${{ env.IMAGE }}:cuda-cu121-amd64-${VERSION}"
            fi
          } > /tmp/tags.txt
          { echo "tags<<EOF"; cat /tmp/tags.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: FLAVOR=cuda
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cuda-amd64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cuda-amd64,mode=max

  publish-cpu-manifest:
    name: Publish CPU Multi-arch Manifest
    runs-on: arc-amd64
    needs: [prepare, build-cpu-amd64, build-cpu-arm64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push CPU multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          extra_tags=()
          if [ "${REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "${{ env.IMAGE }}:cpu-${VERSION}")
          fi
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:cpu" \
            -t "${{ env.IMAGE }}:cpu-${{ github.sha }}" \
            "${extra_tags[@]}" \
            "${{ env.IMAGE }}:cpu-amd64-${{ github.sha }}" \
            "${{ env.IMAGE }}:cpu-arm64-${{ github.sha }}"

      - name: Verify CPU manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:cpu-${{ github.sha }}"

  publish-cuda-manifest:
    name: Publish CUDA Manifest
    runs-on: arc-amd64
    needs: [prepare, build-cuda-amd64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push CUDA manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          extra_tags=()
          if [ "${REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "${{ env.IMAGE }}:cuda-${VERSION}")
          fi
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:cuda" \
            -t "${{ env.IMAGE }}:cuda-${{ github.sha }}" \
            "${extra_tags[@]}" \
            "${{ env.IMAGE }}:cuda-cu121-amd64-${{ github.sha }}"

      - name: Verify CUDA manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:cuda-${{ github.sha }}"
