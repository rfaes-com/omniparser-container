name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniparser-container

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-cpu-amd64:
    name: Build CPU (amd64)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: FLAVOR=cpu
          tags: ${{ env.IMAGE }}:cpu-amd64-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-amd64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-amd64,mode=max

  build-cpu-arm64:
    name: Build CPU (arm64)
    runs-on: ubuntu-24.04-arm
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: FLAVOR=cpu
          tags: ${{ env.IMAGE }}:cpu-arm64-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-arm64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cpu-arm64,mode=max

  build-cuda-amd64:
    name: Build CUDA (amd64)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: FLAVOR=cuda
          tags: |
            ${{ env.IMAGE }}:cuda-amd64-${{ github.sha }}
            ${{ env.IMAGE }}:cuda-cu121-amd64-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-cuda-amd64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-cuda-amd64,mode=max

  publish-cpu-manifest:
    name: Publish CPU Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-cpu-amd64, build-cpu-arm64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push CPU multi-arch manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:cpu-${{ needs.prepare.outputs.version }}" \
            -t "${{ env.IMAGE }}:cpu" \
            "${{ env.IMAGE }}:cpu-amd64-${{ github.sha }}" \
            "${{ env.IMAGE }}:cpu-arm64-${{ github.sha }}"

      - name: Verify CPU manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:cpu-${{ needs.prepare.outputs.version }}"

  publish-cuda-manifest:
    name: Publish CUDA Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-cuda-amd64]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push CUDA manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${{ env.IMAGE }}:cuda-${{ needs.prepare.outputs.version }}" \
            -t "${{ env.IMAGE }}:cuda" \
            "${{ env.IMAGE }}:cuda-amd64-${{ github.sha }}"

      - name: Verify CUDA manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:cuda-${{ needs.prepare.outputs.version }}"
