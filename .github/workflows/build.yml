name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniparser-container

jobs:
  build-cpu-amd64:
    runs-on: [self-hosted, linux, amd64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU AMD64
        run: |
          extra_tags=()
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "$IMAGE:cpu-amd64-${GITHUB_REF_NAME}")
          fi

          docker buildx build \
            --platform linux/amd64 \
            --build-arg FLAVOR=cpu \
            -t $IMAGE:cpu-amd64 \
            -t $IMAGE:cpu-amd64-${{ github.sha }} \
            "${extra_tags[@]}" \
            --push .

  build-cpu-arm64:
    runs-on: [self-hosted, linux, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU ARM64
        run: |
          extra_tags=()
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "$IMAGE:cpu-arm64-${GITHUB_REF_NAME}")
          fi

          docker buildx build \
            --platform linux/arm64 \
            --build-arg FLAVOR=cpu \
            -t $IMAGE:cpu-arm64 \
            -t $IMAGE:cpu-arm64-${{ github.sha }} \
            "${extra_tags[@]}" \
            --push .

  build-cuda-amd64:
    runs-on: [self-hosted, linux, amd64, gpu]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA AMD64
        run: |
          extra_tags=()
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "$IMAGE:cuda-${GITHUB_REF_NAME}")
            extra_tags+=("-t" "$IMAGE:cuda-cu121-amd64-${GITHUB_REF_NAME}")
          fi

          docker buildx build \
            --platform linux/amd64 \
            --build-arg FLAVOR=cuda \
            -t $IMAGE:cuda \
            -t $IMAGE:cuda-cu121-amd64 \
            -t $IMAGE:cuda-${{ github.sha }} \
            -t $IMAGE:cuda-cu121-amd64-${{ github.sha }} \
            "${extra_tags[@]}" \
            --push .

  publish-cpu-manifest:
    runs-on: [self-hosted, linux, amd64]
    needs:
      - build-cpu-amd64
      - build-cpu-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CPU multi-arch manifest
        run: |
          extra_tags=()
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            extra_tags+=("-t" "$IMAGE:cpu-${GITHUB_REF_NAME}")
          fi

          docker buildx imagetools create \
            -t $IMAGE:cpu \
            -t $IMAGE:cpu-${{ github.sha }} \
            "${extra_tags[@]}" \
            $IMAGE:cpu-amd64-${{ github.sha }} \
            $IMAGE:cpu-arm64-${{ github.sha }}
